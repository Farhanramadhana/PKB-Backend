services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgres://tps_user:tps_pass@db:5432/tps_pkb?sslmode=disable
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tps_user
      POSTGRES_PASSWORD: tps_pass
      POSTGRES_DB: tps_pkb
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tps_user -d tps_pkb"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
